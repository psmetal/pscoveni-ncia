name: Build Vite App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Instalar dependências
        run: npm install
        working-directory: ./psconveniencia
      - name: Rodar build
        run: npm run build
        working-directory: ./psconveniencia
      - name: Salvar artefatos do build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./psconveniencia/dist
